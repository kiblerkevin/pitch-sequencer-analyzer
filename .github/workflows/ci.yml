---
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to run CI for"
        required: true
        type: choice
        default: all
        options:
          - all
          - frontend
          - orchestrator
          - inference
          - ingestion

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.resolve.outputs.frontend }}
      orchestrator: ${{ steps.resolve.outputs.orchestrator }}
      inference: ${{ steps.resolve.outputs.inference }}
      ingestion: ${{ steps.resolve.outputs.ingestion }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter (PR only)
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'services/frontend/**'
            orchestrator:
              - 'services/orchestrator/**'
            inference:
              - 'services/inference/**'
              - 'ruff.toml'
              - 'mypy.ini'
            ingestion:
              - 'services/ingestion/**'
              - 'ruff.toml'
              - 'mypy.ini'

      - name: Resolve targets
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ inputs.service }}"
            echo "frontend=$( [ "$SERVICE" = "all" ] || [ "$SERVICE" = "frontend" ] && echo true || echo false )" >> $GITHUB_OUTPUT
            echo "orchestrator=$( [ "$SERVICE" = "all" ] || [ "$SERVICE" = "orchestrator" ] && echo true || echo false )" >> $GITHUB_OUTPUT
            echo "inference=$( [ "$SERVICE" = "all" ] || [ "$SERVICE" = "inference" ] && echo true || echo false )" >> $GITHUB_OUTPUT
            echo "ingestion=$( [ "$SERVICE" = "all" ] || [ "$SERVICE" = "ingestion" ] && echo true || echo false )" >> $GITHUB_OUTPUT
          else
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> $GITHUB_OUTPUT
            echo "orchestrator=${{ steps.filter.outputs.orchestrator }}" >> $GITHUB_OUTPUT
            echo "inference=${{ steps.filter.outputs.inference }}" >> $GITHUB_OUTPUT
            echo "ingestion=${{ steps.filter.outputs.ingestion }}" >> $GITHUB_OUTPUT
          fi

  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - run: NODE_ENV=development npm ci
      - run: npx eslint .
      - run: npx prettier --check "src/**/*.{ts,tsx}"
      - name: Dependency audit
        run: npm audit --audit-level=high

  lint-orchestrator:
    needs: detect-changes
    if: needs.detect-changes.outputs.orchestrator == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/orchestrator/package-lock.json
      - run: NODE_ENV=development npm ci
      - run: npm run lint
      - run: npx prettier --check "src/**/*.ts" "test/**/*.ts"
      - name: Dependency audit
        run: npm audit --audit-level=high

  lint-inference:
    needs: detect-changes
    if: needs.detect-changes.outputs.inference == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff pip-audit
      - run: ruff check .
      - run: ruff format --check .
      - name: Dependency audit
        run: pip-audit -r requirements.txt --severity high

  lint-ingestion:
    needs: detect-changes
    if: needs.detect-changes.outputs.ingestion == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff pip-audit
      - run: ruff check .
      - run: ruff format --check .
      - name: Dependency audit
        run: pip-audit -r requirements.txt --severity high

  test-orchestrator:
    needs: lint-orchestrator
    if: needs.detect-changes.outputs.orchestrator == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/orchestrator/package-lock.json
      - run: NODE_ENV=development npm ci
      - run: npm run test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: orchestrator-coverage
          path: services/orchestrator/coverage/

  build-frontend:
    needs: lint-frontend
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/frontend
          push: false
          load: true
          tags: psa-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: psa-frontend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

  build-orchestrator:
    needs: test-orchestrator
    if: needs.detect-changes.outputs.orchestrator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/orchestrator
          push: false
          load: true
          tags: psa-orchestrator:ci
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: psa-orchestrator:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

  build-inference:
    needs: lint-inference
    if: needs.detect-changes.outputs.inference == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/inference
          push: false
          load: true
          tags: psa-inference:ci
          cache-from: type=gha,scope=inference
          cache-to: type=gha,mode=max,scope=inference
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: psa-inference:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

  build-ingestion:
    needs: lint-ingestion
    if: needs.detect-changes.outputs.ingestion == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/ingestion
          push: false
          load: true
          tags: psa-ingestion:ci
          cache-from: type=gha,scope=ingestion
          cache-to: type=gha,mode=max,scope=ingestion
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: psa-ingestion:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
